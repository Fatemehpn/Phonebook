<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Phonebook</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.5/font/bootstrap-icons.css" rel="stylesheet">
    <style>
        body { background-color: #f0f2f5; }
        .card { border: none; border-radius: 16px; box-shadow: 0 4px 20px rgba(0,0,0,0.08); }
        .contact-item { transition: background 0.2s; border-radius: 10px; }
        .contact-item:hover { background-color: #f8f9fa; }
        .avatar { width: 42px; height: 42px; border-radius: 50%; background-color: #0d6efd; color: white; display: flex; align-items: center; justify-content: center; font-weight: bold; font-size: 1.1rem; flex-shrink: 0; }
    </style>
</head>
<body>

<div class="container py-5" style="max-width: 620px;">

    <!-- Header -->
    <div class="text-center mb-4">
        <h1 class="fw-bold">📒 Phonebook</h1>
        <p class="text-muted">Manage your contacts easily</p>
    </div>

    <!-- Add Contact Card -->
    <div class="card mb-4">
        <div class="card-body p-4">
            <h5 class="fw-bold mb-3">Add a Contact</h5>
            <div class="row g-2">
                <div class="col">
                    <input type="text" id="name" class="form-control" placeholder="Full name" />
                </div>
                <div class="col">
                    <input type="text" id="phone" class="form-control" placeholder="Phone number" />
                </div>
            </div>
            <button class="btn btn-primary w-100 mt-3" onclick="addContact()">
                <i class="bi bi-person-plus-fill me-2"></i>Add Contact
            </button>
            <p id="add-message" class="mt-2 mb-0 small text-center"></p>
        </div>
    </div>

    <!-- Contacts Card -->
    <div class="card">
        <div class="card-body p-4">
            <div class="d-flex justify-content-between align-items-center mb-3">
                <h5 class="fw-bold mb-0">Contacts <span id="contact-count" class="badge bg-primary ms-1">0</span></h5>
            </div>

            <!-- Search -->
            <div class="input-group mb-3">
                <span class="input-group-text bg-white"><i class="bi bi-search"></i></span>
                <input type="text" id="search" class="form-control border-start-0" placeholder="Search by name or phone" oninput="searchContacts()" />
            </div>

            <!-- List -->
            <ul class="list-unstyled mb-0" id="contact-list"></ul>
        </div>
    </div>

</div>

<!-- Edit Modal -->
<div class="modal fade" id="editModal" tabindex="-1">
    <div class="modal-dialog modal-dialog-centered">
        <div class="modal-content" style="border-radius: 16px; border: none;">
            <div class="modal-header border-0 pb-0">
                <h5 class="modal-title fw-bold">Edit Contact</h5>
                <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
            </div>
            <div class="modal-body">
                <input type="hidden" id="edit-original-phone" />
                <div class="mb-3">
                    <label class="form-label text-muted small">Name</label>
                    <input type="text" id="edit-name" class="form-control" />
                </div>
                <div class="mb-3">
                    <label class="form-label text-muted small">Phone</label>
                    <input type="text" id="edit-phone" class="form-control" />
                </div>
                <p id="edit-message" class="small text-danger mb-0"></p>
            </div>
            <div class="modal-footer border-0 pt-0">
                <button class="btn btn-light" data-bs-dismiss="modal">Cancel</button>
                <button class="btn btn-primary px-4" onclick="saveEdit()">Save Changes</button>
            </div>
        </div>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
<script>
    const API = "http://127.0.0.1:5000"
    let editModal = new bootstrap.Modal(document.getElementById("editModal"))

    async function loadContacts() {
        const res = await fetch(`${API}/contacts`)
        const contacts = await res.json()
        displayContacts(contacts)
    }

    function getAvatar(name) {
        return name.trim().charAt(0).toUpperCase()
    }

    function displayContacts(contacts) {
        const list = document.getElementById("contact-list")
        const count = document.getElementById("contact-count")
        count.textContent = contacts.length
        list.innerHTML = ""

        if (contacts.length === 0) {
            list.innerHTML = `
                <div class="text-center text-muted py-4">
                    <i class="bi bi-person-x fs-1"></i>
                    <p class="mt-2">No contacts found.</p>
                </div>`
            return
        }

        contacts.forEach(contact => {
            list.innerHTML += `
                <li class="contact-item d-flex align-items-center justify-content-between p-2 mb-1">
                    <div class="d-flex align-items-center gap-3">
                        <div class="avatar">${getAvatar(contact.name)}</div>
                        <div>
                            <div class="fw-semibold">${contact.name}</div>
                            <div class="text-muted small">${contact.phone}</div>
                        </div>
                    </div>
                    <div class="d-flex gap-2">
                        <button class="btn btn-sm btn-light" onclick="showEdit('${contact.name}', '${contact.phone}')">
                            <i class="bi bi-pencil"></i>
                        </button>
                        <button class="btn btn-sm btn-light text-danger" onclick="deleteContact('${contact.phone}')">
                            <i class="bi bi-trash"></i>
                        </button>
                    </div>
                </li>`
        })
    }

    async function addContact() {
        const name = document.getElementById("name").value.trim()
        const phone = document.getElementById("phone").value.trim()
        const message = document.getElementById("add-message")

        if (!name || !phone) {
            message.innerHTML = `<span class="text-danger">✗ Please fill in both fields.</span>`
            return
        }

        const res = await fetch(`${API}/contacts`, {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify({ name, phone })
        })

        const data = await res.json()

        if (res.ok) {
            message.innerHTML = `<span class="text-success">✓ Contact added!</span>`
            document.getElementById("name").value = ""
            document.getElementById("phone").value = ""
            loadContacts()
        } else {
            message.innerHTML = `<span class="text-danger">✗ ${data.error}</span>`
        }
    }

    async function deleteContact(phone) {
        if (!confirm("Are you sure you want to remove this contact?")) return
        await fetch(`${API}/contacts/${phone}`, { method: "DELETE" })
        loadContacts()
    }

    async function searchContacts() {
        const query = document.getElementById("search").value.trim().toLowerCase()
        const res = await fetch(`${API}/contacts`)
        const contacts = await res.json()
        const results = contacts.filter(c =>
            c.name.toLowerCase().includes(query) || c.phone.includes(query)
        )
        displayContacts(results)
    }

    function showEdit(currentName, currentPhone) {
        document.getElementById("edit-name").value = currentName
        document.getElementById("edit-phone").value = currentPhone
        document.getElementById("edit-original-phone").value = currentPhone
        document.getElementById("edit-message").textContent = ""
        editModal.show()
    }

    async function saveEdit() {
        const originalPhone = document.getElementById("edit-original-phone").value
        const newName = document.getElementById("edit-name").value.trim()
        const newPhone = document.getElementById("edit-phone").value.trim()
        const message = document.getElementById("edit-message")

        if (!newName || !newPhone) {
            message.textContent = "✗ Please fill in both fields."
            return
        }

        const res = await fetch(`${API}/contacts/${originalPhone}`, {
            method: "PUT",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify({ name: newName, phone: newPhone })
        })

        const data = await res.json()

        if (res.ok) {
            editModal.hide()
            loadContacts()
        } else {
            message.textContent = `✗ ${data.error}`
        }
    }

    loadContacts()
</script>

</body>
</html>
